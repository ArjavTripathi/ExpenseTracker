
name: Deploy Backend
on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Sync to environment and deploy
        run: |
          ENV_DIR=~/homelab/projects/expensetracker/prod
          mkdir -p "$ENV_DIR/repo/backend"
          rsync -a --delete ./ "$ENV_DIR/repo/backend/"
          cd "$ENV_DIR" && docker compose up -d --build backend
